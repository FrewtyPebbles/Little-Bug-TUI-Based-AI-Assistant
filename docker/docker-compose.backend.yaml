services:

  # AUTH
  postgres-keycloak:
    image: postgres:16
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${AUTH_DB_USERNAME}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: ${AUTH_DB_USERNAME}
      KC_DB_PASSWORD: ${AUTH_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      postgres-keycloak:
        condition: service_healthy

  # APPLICATION LAYER

  ## Chat service

  cassandra:
    image: cassandra:5.0
    restart: always
    environment:
      CASSANDRA_CLUSTER_NAME: littlebug
      CASSANDRA_PASSWORD: ${CASSANDRA_PASSWORD}
      CASSANDRA_USER: ${CASSANDRA_USER}
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra

  redis:
    image: redis:7.4-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  ## Vector/Relational Database

  postgres-application:
    image: pgvector/pgvector:16
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${APP_DB}
      POSTGRES_USER: ${APP_DB_USERNAME}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ## Backend API Server

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    env_file:
      - ../.env
    depends_on:
      postgres-application:
        condition: service_healthy
      cassandra:
        condition: service_started
      redis:
        condition: service_started
      keycloak:
        condition: service_started

volumes:
  postgres_auth_data:
  postgres_app_data:
  redis_data:
  cassandra_data: